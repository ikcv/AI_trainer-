<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>人工智能训练师三级手机刷题版</title>
<style>
:root{
  --bg:#f6f7fb;--card:#fff;--text:#18202f;--sub:#6b7280;--line:#e5e7eb;
  --top-bg:rgba(246,247,251,.95);--soft:#f3f4f6;--bar-bg:#e5e7eb;
  --pri:#2563eb;--pri2:#dbeafe;--ok:#16a34a;--ok2:#dcfce7;--bad:#dc2626;--bad2:#fee2e2;
  --warn:#f59e0b;--warn2:#fffbeb;--shadow:0 10px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body.dark{
  --bg:#0f172a;--card:#172033;--text:#eef2ff;--sub:#aab4c8;--line:#2b3650;
  --top-bg:rgba(15,23,42,.95);--soft:#22304a;--bar-bg:#26324b;
  --pri:#60a5fa;--pri2:#1d365b;--ok:#22c55e;--ok2:#163822;--bad:#fb7185;--bad2:#432129;
  --warn:#fbbf24;--warn2:#3b2f16;--shadow:0 10px 30px rgba(0,0,0,.28);
}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;overscroll-behavior-y:contain}
button{font:inherit}
.app{min-height:100vh;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.top{position:sticky;top:0;z-index:10;background:var(--top-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:9px 14px 10px}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.title{font-weight:800;font-size:16px;line-height:1.2}
.pill{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 10px;color:var(--sub);font-size:12px;white-space:nowrap}
.top-tools{margin-top:8px}
.top-tools summary{list-style:none;display:flex;justify-content:space-between;align-items:center;color:var(--sub);font-size:12px;font-weight:800;padding:6px 0;cursor:pointer}
.top-tools summary::-webkit-details-marker{display:none}
.top-tools summary::after{content:"展开";color:var(--pri)}
.top-tools[open] summary::after{content:"收起"}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px}
.tab{border:1px solid var(--line);background:var(--card);color:var(--sub);border-radius:8px;padding:8px 6px;font-weight:700;font-size:12px}
.tab.active{background:var(--pri);border-color:var(--pri);color:#fff}
.progress-wrap{margin-top:10px}
.progress-meta{display:flex;justify-content:space-between;gap:10px;color:var(--sub);font-size:12px;margin-bottom:6px}
.bar{height:8px;border-radius:999px;background:var(--bar-bg);overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pri),#22c55e);border-radius:999px;transition:width .18s ease}
.main{padding:14px;max-width:760px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
.q-card{padding:14px}
.q-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.q-meta{display:flex;align-items:center;gap:6px;min-width:0;flex-wrap:wrap}
.q-type{font-size:12px;font-weight:800;color:var(--pri);background:var(--pri2);padding:5px 8px;border-radius:999px;white-space:nowrap}
.q-side{display:flex;align-items:center;justify-content:flex-end;gap:7px;min-width:0}
.edit-btn{border:1px solid #c7d2fe;background:#eef2ff;color:#4338ca;border-radius:999px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;padding:0;flex:0 0 auto}
.doubt-btn{border:1px solid #fde68a;background:var(--warn2);color:#b45309;border-radius:999px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;padding:0;flex:0 0 auto}
.doubt-btn.active{background:#f59e0b;border-color:#f59e0b;color:#fff}
.q-index{font-size:12px;color:var(--sub);white-space:nowrap}
.copy-btn{border:1px solid #bfdbfe;background:var(--pri2);color:var(--pri);border-radius:999px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;padding:0}
.q-text{font-size:clamp(15px,var(--q-font,17px),18px);line-height:1.55;font-weight:700;margin:6px 0 13px;word-break:break-word}
.opts{display:grid;gap:8px}
.opt{width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:10px 11px;text-align:left;display:grid;grid-template-columns:30px 1fr;gap:9px;align-items:flex-start;color:var(--text);touch-action:manipulation}
.opt:active{transform:scale(.995)}
.letter{width:28px;height:28px;border-radius:999px;background:var(--soft);color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:900}
.opt-text{line-height:1.48;font-size:clamp(14px,var(--opt-font,15px),16px)}
.opt.correct{border-color:var(--ok);background:var(--ok2)}
.opt.correct .letter{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad2)}
.opt.wrong .letter{background:var(--bad);color:#fff}
.opt.selected{border-color:var(--pri);background:var(--pri2)}
.opt.selected .letter{background:var(--pri);color:#fff}
.opt.missed{border-color:var(--ok);background:#f0fdf4}
.opt.missed .letter{background:#bbf7d0;color:#166534}
.opt.disabled{pointer-events:none}
.judge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.judge-grid .opt{display:flex;align-items:center;justify-content:center;gap:10px;min-height:66px;padding:10px}
.judge-grid .opt-text{display:inline;font-size:16px;font-weight:900;line-height:1.2}
.result{margin-top:14px;border-radius:10px;padding:12px 13px;font-size:14px;line-height:1.55;font-weight:700}
.result.ok{background:var(--ok2);color:#166534;border:1px solid #86efac}
.result.bad{background:var(--bad2);color:#991b1b;border:1px solid #fecaca}
.result.warn{background:var(--warn2);color:#92400e;border:1px solid #fde68a}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.btn{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:10px 9px;color:var(--text);font-weight:800}
.btn.primary{background:var(--pri);border-color:var(--pri);color:#fff}
.btn.danger{background:var(--bad);border-color:var(--bad);color:#fff}
.btn.ghost{color:var(--sub)}
.btn.pass{background:#22c55e;border-color:#22c55e;color:#fff}
.btn.pass.pending{background:var(--warn);border-color:var(--warn);color:#111827}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.exam-summary{padding:14px;display:grid;gap:12px}
.score-big{font-size:34px;font-weight:900;line-height:1;color:var(--pri)}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mini{border:1px solid var(--line);border-radius:8px;padding:9px 8px;background:var(--bg)}
.mini b{display:block;font-size:17px;color:var(--text)}
.mini span{display:block;font-size:12px;color:var(--sub);margin-top:2px}
.record-list{display:grid;gap:8px}
.record-btn{width:100%;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:10px;color:var(--text);text-align:left;display:flex;justify-content:space-between;gap:10px;align-items:center}
.record-btn b{font-size:15px}
.record-btn span{font-size:12px;color:var(--sub)}
.drawer{margin-top:12px;overflow:hidden}
.drawer summary{list-style:none;padding:13px 14px;font-weight:800;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.drawer summary::-webkit-details-marker{display:none}
.dot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px;padding:0 12px 12px}
.dot-section{padding:0 12px 4px;color:var(--sub);font-size:12px;font-weight:900}
.dot{min-height:30px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--sub);font-size:12px;font-weight:800;padding:4px 2px;line-height:1.15}
.dot.current{outline:2px solid var(--pri);outline-offset:1px;color:var(--pri)}
.dot.done{background:var(--ok2);border-color:#86efac;color:#166534}
.dot.bad{background:var(--bad2);border-color:#fecaca;color:#991b1b}
.dot.pass{background:var(--pri2);border-color:#93c5fd;color:#1d4ed8}
.dot.doubt{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.empty{padding:28px 16px;text-align:center;color:var(--sub);line-height:1.7}
.settings{padding:14px;display:grid;gap:12px}
.setting-title{font-weight:900;margin-bottom:2px}
.setting-text{color:var(--sub);font-size:13px;line-height:1.7}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg .btn{padding:8px 10px;font-size:13px}
.seg .active{background:var(--pri);border-color:var(--pri);color:#fff}
.file{display:none}
body.dark .result.ok,body.dark .opt.missed,body.dark .dot.done{color:#bbf7d0}
body.dark .result.bad,body.dark .dot.bad{color:#fecdd3}
body.dark .result.warn,body.dark .doubt-btn:not(.active),body.dark .dot.doubt{color:#fde68a}
body.dark .edit-btn{background:#242f55;color:#c7d2fe;border-color:#3f4c7a}
@media (min-width:520px){
  .dot-grid{grid-template-columns:repeat(auto-fill,minmax(38px,1fr))}
  .q-text{font-size:clamp(16px,var(--q-font,18px),19px)}
}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>

const DEFAULT_WRONG_SETTINGS={correctToRemove:2};

function normalizeWrongSettings(raw){
  const v=Number(raw&&raw.correctToRemove);
  return {correctToRemove:Number.isFinite(v)&&v>=0?Math.floor(v):DEFAULT_WRONG_SETTINGS.correctToRemove};
}

function normalizeWrongItem(raw){
  const item=raw&&typeof raw==='object'?raw:{};
  const ts=Math.max(0,Number(item.ts)||Date.now());
  return {
    ...item,
    count:Math.max(1,Number(item.count)||1),
    correctStreak:Math.max(0,Number(item.correctStreak)||0),
    reviewCorrectCount:Math.max(0,Number(item.reviewCorrectCount)||0),
    reviewWrongCount:Math.max(0,Number(item.reviewWrongCount)||0),
    ts,
    lastReviewTs:Math.max(0,Number(item.lastReviewTs)||ts),
    lastReviewResult:item.lastReviewResult||null,
  };
}

function buildExamUsedKeys(results){
  const used={};
  (Array.isArray(results)?results:[]).forEach(r=>{
    (Array.isArray(r&&r.questions)?r.questions:[]).forEach(item=>{
      if(item&&item.key)used[item.key]=r.finishedAt||r.startedAt||Date.now();
    });
  });
  return used;
}

function keyOf(type,idx){return type+'_'+idx;}

function questionKey(q,type,idx){
  if(q&&q.key)return q.key;
  if(type&&(Number.isFinite(idx)))return keyOf(type,idx);
  const t=(q&&q.type)||type;
  const found=t&&q?findBankIndex(t,q.q):-1;
  return found>=0?keyOf(t,found):'';
}
function normalizeAnswer(type,val){
  if(type==='j')return val===true||val==='true'||val==='正确'||val==='对'||val===1||val==='1';
  return String(val||'').trim().toUpperCase();
}

  const t=(q&&q.type)||type;
  const k=questionKey(q,t,idx);
  if(k&&Object.prototype.hasOwnProperty.call(state.answerOverrides,k))return normalizeAnswer(t,state.answerOverrides[k]);
  return normalizeAnswer(t,q?q.a:null);
}
function sameAnswer(q,userAns){return normalizeAnswer(q.type,userAns)===answerOf(q);}
function answerText(q){const a=answerOf(q);return q.type==='j'?(a?'正确':'错误'):a;}
function getWrongRemoveTarget(){return normalizeWrongSettings(state.wrongSettings).correctToRemove;}
function clearAutoTimer(){if(state.autoTimer){clearTimeout(state.autoTimer);state.autoTimer=null;}}
function clearPassVerify(){state.passVerifyKey=null;}
function applyTheme(){document.body.classList.toggle('dark',!!state.darkMode);}
function setDarkMode(v){state.darkMode=!!v;LS.set('mobileDarkMode',state.darkMode);applyTheme();render();}
function setTopExpanded(open){state.topExpanded=!!open;LS.set('mobileTopExpanded',state.topExpanded);}
function normalizeQuestionText(text){return String(text||'').replace(/[\s（）()，,。.、：:；;“”"']/g,'');}

function findBankIndex(type,questionText){
  const list=bank[type]||[];
  const exact=list.findIndex(q=>q.q===questionText);
  if(exact>=0)return exact;
  const key=normalizeQuestionText(questionText);
  return list.findIndex(q=>normalizeQuestionText(q.q)===key);
}

function sourceLabel(q,fallbackIdx,wrongMode){
  const type=q.type||typeFromMode();
  if(wrongMode&&q.key){
    const m=String(q.key).match(/^([js])_(\d+)$/);
    if(m)return labelOf(m[1])+'第'+(Number(m[2])+1)+'题';
  }
  const found=wrongMode?findBankIndex(type,q.q):fallbackIdx;
  if(found>=0)return labelOf(type)+'第'+(found+1)+'题';
  return labelOf(type)+'题';
}

function optionText(q,val){
  if(q.type==='j')return val===true||val==='true'?'正确':'错误';
  return String(val||'')+(q.opts&&q.opts[val]?'：'+q.opts[val]:'');
}

function editCorrectAnswer(type,idx){
  clearAutoTimer();
  const q=(bank[type]||[])[idx];
  if(!q)return;
  const key=keyOf(type,idx);
  const oldAnswer=answerOf(q,type,idx);
  let nextAnswer=null;
  if(type==='j'){
    const raw=prompt('修改正确答案：请输入“正确”或“错误”。',oldAnswer?'正确':'错误');
    if(raw===null)return;
    const text=String(raw).trim();
    if(['正确','对','true','1','T','t'].includes(text))nextAnswer=true;
    else if(['错误','错','false','0','F','f'].includes(text))nextAnswer=false;
    else {alert('只能填写：正确 或 错误');return;}
  }else{
    const keys=Object.keys(q.opts||{}).sort();
    const raw=prompt('修改正确答案：请输入选项 '+keys.join('/')+'。',String(oldAnswer||''));
    if(raw===null)return;
    const text=String(raw).trim().toUpperCase();
    if(!keys.includes(text)){alert('只能填写：'+keys.join('/'));return;}
    nextAnswer=text;
  }
  if(nextAnswer===oldAnswer){
    alert('正确答案没有变化。');
    return;
  }
  state.answerOverrides[key]=nextAnswer;
  persistAnswerOverrides();
  const wrong=state.wrongList.find(w=>w.key===key);
  if(wrong)wrong.a=nextAnswer;
  const userAns=state.bankAnswered[key];
  if(userAns!==undefined){
    if(normalizeAnswer(type,userAns)===nextAnswer){
      forgetWrong(key);
    }else{
      addWrong(q,userAns,type,idx);
      if(state.passed[key])delete state.passed[key];
    }
  }else if(state.passed[key]){
    delete state.passed[key];
  }
  persistPassed();
  persistWrongList();
  state.examResults=(state.examResults||[]).map(r=>{
    if(!(r.questions||[]).some(item=>item.key===key))return r;
    return {...r,...scoreExam(r.questions||[],r.answers||{})};
  });
  persistExamResults();
  delete state.wrongAnswered[key];
  state.passNotice={key,type:'warn',msg:'正确答案已修改为：'+optionText(q,nextAnswer)};
  alert('已修改正确答案：'+optionText(q,nextAnswer));
  render();
}

function saveBankProgress(aKey,isCorrect){
  LS.set('bankAnswered',state.bankAnswered);
  if(!state.bankStats[aKey])state.bankStats[aKey]={attempts:0,correct:0};
  state.bankStats[aKey].attempts++;
  if(isCorrect)state.bankStats[aKey].correct++;
  LS.set('bankStats',state.bankStats);
}

function addWrong(q,userAns,qType,qIdx){
  const key=keyOf(qType,qIdx);
  const existing=state.wrongList.find(w=>w.key===key);
  if(existing){
    existing.a=answerOf(q,qType,qIdx);
    existing.userAns=userAns;
    existing.count=Math.max(1,Number(existing.count)||1)+1;
    existing.reviewWrongCount=Math.max(0,Number(existing.reviewWrongCount)||0)+1;
    existing.correctStreak=0;
    existing.lastReviewResult='wrong';
    existing.lastReviewTs=Date.now();
  }else{
    state.wrongList.push(normalizeWrongItem({
      key,type:q.type,q:q.q,opts:q.opts,a:answerOf(q,qType,qIdx),userAns,count:1,correctStreak:0,
      reviewCorrectCount:0,reviewWrongCount:1,ts:Date.now(),lastReviewTs:Date.now(),lastReviewResult:'wrong'
    }));
  }
  persistWrongList();
}

function addCurrentToWrong(){
  clearAutoTimer();
  const t=typeFromMode(),idx=currentIdx(),q=bank[t][idx],aKey=keyOf(t,idx);
  const userAns=state.bankAnswered[aKey];
  if(userAns===undefined){
    state.passNotice={key:aKey,type:'warn',msg:'这题还没作答，先选一个答案后再加入错题本。'};
    render();
    return;
  }
  addWrong(q,userAns,t,idx);
  if(state.passed[aKey]){delete state.passed[aKey];persistPassed();}
  state.passNotice={key:aKey,type:'warn',msg:'已手动加入错题本。'};
  render();
}

function forgetWrong(key){
  const before=state.wrongList.length;
  state.wrongList=state.wrongList.filter(w=>w.key!==key);
  if(state.wrongList.length!==before)persistWrongList();
}

function markCurrentAsCorrect(){
  clearAutoTimer();
  const t=typeFromMode(),idx=currentIdx(),q=bank[t][idx],aKey=keyOf(t,idx);
  state.bankAnswered[aKey]=answerOf(q,t,idx);
  if(!state.bankStats[aKey])state.bankStats[aKey]={attempts:1,correct:1};
  state.bankStats[aKey].attempts=Math.max(1,Number(state.bankStats[aKey].attempts)||1);
  state.bankStats[aKey].correct=Math.max(1,Number(state.bankStats[aKey].correct)||0);
  LS.set('bankAnswered',state.bankAnswered);
  LS.set('bankStats',state.bankStats);
  forgetWrong(aKey);
  state.passNotice={key:aKey,type:'warn',msg:'已按正确处理，并从错题本移除。'};
  render();
}

function markWrongAsCorrect(){
  clearAutoTimer();
  const items=wrongItems();
  if(items.length===0)return;
  const idx=Math.min(state.wrongIdx,items.length-1);
  const w=items[idx];
  const realIdx=findBankIndex(w.type,w.q);
  const aKey=w.key||keyOf(w.type,realIdx);
  if(realIdx>=0){
    state.bankAnswered[aKey]=answerOf(w,w.type,realIdx);
    if(!state.bankStats[aKey])state.bankStats[aKey]={attempts:1,correct:1};
    state.bankStats[aKey].attempts=Math.max(1,Number(state.bankStats[aKey].attempts)||1);
    state.bankStats[aKey].correct=Math.max(1,Number(state.bankStats[aKey].correct)||0);
    LS.set('bankAnswered',state.bankAnswered);
    LS.set('bankStats',state.bankStats);
  }
  delete state.wrongAnswered[w.key];
  forgetWrong(w.key);
  const nextItems=wrongItems();
  state.wrongIdx=Math.min(idx,Math.max(nextItems.length-1,0));
  render();
}

function removeWrong(key){
  const item=state.wrongList.find(w=>w.key===key);
  if(!item)return false;
  item.reviewCorrectCount=Math.max(0,Number(item.reviewCorrectCount)||0)+1;
  item.correctStreak=Math.max(0,Number(item.correctStreak)||0)+1;
  item.lastReviewResult='correct';
  item.lastReviewTs=Date.now();
  const target=getWrongRemoveTarget();
  if(target>0&&item.correctStreak>=target){
    state.wrongList=state.wrongList.filter(w=>w.key!==key);
    persistWrongList();
    return true;
  }
  persistWrongList();
  return false;
}

function typeStats(type){
  const total=bank[type].length;
  let answered=0,correct=0,wrong=0,passed=0,doubts=0,completed=0;
  for(let i=0;i<total;i++){
    const q=bank[type][i],k=keyOf(type,i);
    if(state.passed[k])passed++;
    if(state.doubts[k])doubts++;
    if(state.bankAnswered[k]!==undefined){
      answered++;
      if(sameAnswer(q,state.bankAnswered[k]))correct++;else wrong++;
    }
    if(state.bankAnswered[k]!==undefined||state.passed[k])completed++;
  }
  return {total,answered,correct,wrong,passed,doubts,completed};
}

function nextTodoFrom(type,start){
  const list=bank[type];
  for(let offset=1;offset<=list.length;offset++){
    const idx=(start+offset)%list.length;
    const k=keyOf(type,idx);
    if(!state.passed[k]&&!state.doubts[k]&&state.bankAnswered[k]===undefined)return idx;
  }
  return Math.min(start+1,list.length-1);
}

function goNext(auto){
  clearAutoTimer();
  clearPassVerify();
  const t=typeFromMode();
  const cur=currentIdx();
  setCurrentIdx(nextTodoFrom(t,cur));
  render();
  if(auto)window.scrollTo({top:0,behavior:'smooth'});
}

function goPrev(){
  clearAutoTimer();
  clearPassVerify();
  setCurrentIdx(currentIdx()-1);
  render();
}

function switchMode(mode){
  clearAutoTimer();
  clearPassVerify();
  if(mode==='wrong'&&state.mode!=='wrong')state.wrongAnswered={};
  state.mode=mode;
  LS.set('mobileMode',mode);
  render();
  window.scrollTo(0,0);
}

function answerBank(val){
  clearAutoTimer();
  const t=typeFromMode(),idx=currentIdx(),q=bank[t][idx],aKey=keyOf(t,idx);
  if(state.bankAnswered[aKey]!==undefined)return;
  const verifyingPass=state.passVerifyKey===aKey;
  clearPassVerify();
  state.passNotice=null;
  if(state.passed[aKey]){delete state.passed[aKey];persistPassed();}
  state.bankAnswered[aKey]=val;
  const ok=sameAnswer(q,val);
  saveBankProgress(aKey,ok);
  if(ok){
    removeWrong(aKey);
    if(verifyingPass){
      state.passed[aKey]=true;
      persistPassed();
    }
    goNext(true);
  }else{
    addWrong(q,val,t,idx);
    if(verifyingPass)state.passNotice={key:aKey,type:'bad',msg:'Pass 检验未通过，已加入错题本。'};
    render();
  }
}

function togglePassCurrent(){
  clearAutoTimer();
  const t=typeFromMode(),idx=currentIdx(),q=bank[t][idx],aKey=keyOf(t,idx);
  if(state.passed[aKey]){
    delete state.passed[aKey];
    state.passNotice={key:aKey,type:'warn',msg:'已取消 Pass。'};
    clearPassVerify();
    persistPassed();
    render();
    return;
  }
  if(state.doubts[aKey]){
    state.passNotice={key:aKey,type:'warn',msg:'本题已标记疑问，取消疑问后才能 Pass。'};
    clearPassVerify();
    render();
    return;
  }
  const userAns=state.bankAnswered[aKey];
  if(userAns===undefined){
    state.passVerifyKey=state.passVerifyKey===aKey?null:aKey;
    state.passNotice=state.passVerifyKey?{key:aKey,type:'warn',msg:'已进入 Pass 检验：请先选答案，答对才会加入 Pass。'}:{key:aKey,type:'warn',msg:'已取消 Pass 检验。'};
    render();
    return;
  }
  if(!sameAnswer(q,userAns)){
    state.passNotice={key:aKey,type:'bad',msg:'本题当前不是答对状态，不能 Pass。'};
    clearPassVerify();
    render();
    return;
  }
  forgetWrong(aKey);
  state.passed[aKey]=true;
  state.passNotice=null;
  clearPassVerify();
  persistPassed();
  setCurrentIdx(nextTodoFrom(t,idx));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function optionClick(evt,val,wrongMode){
  if(wrongMode)answerWrong(val);
  else answerBank(val);
}

function wrongTypeOrder(type){return type==='s'?0:1;}

function wrongOriginalIndex(w){
  const m=String(w.key||'').match(/^([js])_(\d+)$/);
  if(m)return Number(m[2]);
  return findBankIndex(w.type,w.q);
}

function wrongItems(){
  return state.wrongList
    .filter(w=>w&&(w.type==='j'||w.type==='s'))
    .sort((a,b)=>wrongTypeOrder(a.type)-wrongTypeOrder(b.type)
      || wrongOriginalIndex(a)-wrongOriginalIndex(b)
      || (Number(a.ts)||0)-(Number(b.ts)||0));
}

function nextWrongTodoIndex(items,start,dir=1){
  if(!items.length)return -1;
  const len=items.length;
  const step=dir>=0?1:-1;
  for(let offset=1;offset<=len;offset++){
    const idx=(start+offset*step+len*2)%len;
    if(state.wrongAnswered[items[idx].key]===undefined)return idx;
  }
  return -1;
}

function advanceWrongRound(fromIdx){
  const items=wrongItems();
  if(items.length===0){
    state.wrongAnswered={};
    state.wrongIdx=0;
    return items;
  }
  const start=Math.max(0,Math.min(fromIdx,items.length-1));
  const next=nextWrongTodoIndex(items,start,1);
  if(next>=0){
    state.wrongIdx=next;
    return items;
  }
  state.wrongAnswered={};
  state.wrongIdx=0;
  return items;
}

function answerWrong(val){
  const items=wrongItems();
  if(items.length===0)return;
  const idx=Math.min(state.wrongIdx,items.length-1);
  const w=items[idx];
  if(state.wrongAnswered[w.key]!==undefined)return;
  const ok=sameAnswer(w,val);
  state.wrongAnswered[w.key]=val;
  if(ok){
    w.userAns=val;
    removeWrong(w.key);
    const nextItems=advanceWrongRound(idx);
    render();
    if(nextItems.length>0)setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),260);
  }else{
    w.userAns=val;
    w.count=Math.max(1,Number(w.count)||1)+1;
    w.reviewWrongCount=Math.max(0,Number(w.reviewWrongCount)||0)+1;
    w.correctStreak=0;
    w.lastReviewResult='wrong';
    w.lastReviewTs=Date.now();
    persistWrongList();
    render();
  }
}

function wrongNav(dir,auto){
  const items=wrongItems();
  const len=items.length;
  if(len===0){render();return;}
  clearPassVerify();
  if(dir<0){
    state.wrongIdx=Math.max(0,Math.min(len-1,state.wrongIdx-1));
    render();
    if(auto)window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  const next=nextWrongTodoIndex(items,Math.max(0,Math.min(state.wrongIdx,len-1)),dir);
  if(next>=0){
    state.wrongIdx=next;
  }else{
    state.wrongAnswered={};
    state.wrongIdx=dir<0?len-1:0;
  }
  render();
  if(auto)window.scrollTo({top:0,behavior:'smooth'});
}

function gotoWrong(i){
  const len=wrongItems().length;
  if(len===0)return;
  clearPassVerify();
  state.wrongIdx=Math.max(0,Math.min(len-1,i));
  const d=document.querySelector('.drawer');
  if(d)d.open=false;
  render();
  window.scrollTo(0,0);
}

function gotoQuestion(i){
  clearAutoTimer();
  clearPassVerify();
  setCurrentIdx(i);
  const d=document.querySelector('.drawer');
  if(d)d.open=false;
  render();
  window.scrollTo(0,0);
}

function shuffleCopy(list){
  const arr=list.slice();
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function examUsedCount(type){
  return Object.keys(state.examUsedKeys||{}).filter(k=>k.startsWith(type+'_')).length;
}

function examAvailable(type){
  return bank[type]
    .map((q,idx)=>({type,idx,key:keyOf(type,idx)}))
    .filter(x=>!state.passed[x.key]&&!state.examUsedKeys[x.key]);
}

function resetExamUsedKeys(){
  if(!confirm('确认清空模拟测试的“已抽过”记录？清空后模拟测试可以重新抽到以前出现过的题。'))return;
  state.examUsedKeys={};
  persistExamUsedKeys();
  render();
}

function startExam(){
  clearAutoTimer();
  clearPassVerify();
  if(state.examActive&&state.examActive.questions&&!state.examActive.finishedAt){
    if(!confirm('当前还有未交卷的模拟测试，确认重新开始？'))return;
  }
  const jPick=shuffleCopy(examAvailable('j')).slice(0,20);
  const sPick=shuffleCopy(examAvailable('s')).slice(0,40);
  if(jPick.length+sPick.length===0){alert('没有未抽过的可抽取题目：可能都被 Pass 了，或模拟测试已经抽完了。可以清空模拟抽题记录后再抽。');return;}
  if(jPick.length<20||sPick.length<40)alert('未抽过题目不足：本次抽到判断 '+jPick.length+' 题，单选 '+sPick.length+' 题。');
  const questions=jPick.concat(sPick);
  questions.forEach(item=>{state.examUsedKeys[item.key]=Date.now();});
  state.examActive={
    id:'exam_'+Date.now(),
    startedAt:Date.now(),
    questions,
    answers:{},
    finishedAt:null,
  };
  state.examIdx=0;
  state.examReviewId=null;
  persistExam();
  persistExamUsedKeys();
  render();
  window.scrollTo(0,0);
}

function examQuestion(item){
  const q=item&&bank[item.type]&&bank[item.type][item.idx];
  return q?{...q,key:item.key}:null;
}

function activeExamQuestions(){
  return state.examActive&&Array.isArray(state.examActive.questions)?state.examActive.questions:[];
}

function currentExamResult(){
  return (state.examResults||[]).find(r=>r.id===state.examReviewId)||null;
}

function examAverageScore(){
  const list=state.examResults||[];
  if(!list.length)return 0;
  return list.reduce((sum,r)=>sum+(Number(r.score)||0),0)/list.length;
}

function scoreExam(questions,answers){
  let jTotal=0,sTotal=0,jCorrect=0,sCorrect=0;
  questions.forEach(item=>{
    const q=examQuestion(item);
    if(!q)return;
    const ans=answers[item.key];
    const ok=ans!==undefined&&sameAnswer(q,ans);
    if(item.type==='j'){jTotal++;if(ok)jCorrect++;}
    else {sTotal++;if(ok)sCorrect++;}
  });
  const raw=jCorrect*.5+sCorrect;
  const maxRaw=jTotal*.5+sTotal;
  const score=maxRaw?raw/maxRaw*100:0;
  return {jTotal,sTotal,jCorrect,sCorrect,raw,maxRaw,score,total:jTotal+sTotal,correct:jCorrect+sCorrect};
}

function examAnswer(val){
  const items=activeExamQuestions();
  if(!items.length)return;
  const idx=Math.max(0,Math.min(state.examIdx,items.length-1));
  const item=items[idx];
  const q=examQuestion(item);
  if(!q)return;
  state.examActive.answers[item.key]=normalizeAnswer(item.type,val);
  const next=nextExamTodoIndex(items,idx,1);
  if(next>=0)state.examIdx=next;
  persistExam();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextExamTodoIndex(items,start,dir=1){
  if(!items.length||!state.examActive)return -1;
  const len=items.length,step=dir>=0?1:-1;
  for(let offset=1;offset<=len;offset++){
    const idx=(start+offset*step+len*2)%len;
    if(state.examActive.answers[items[idx].key]===undefined)return idx;
  }
  return -1;
}

function examNav(dir){
  const items=activeExamQuestions();
  if(!items.length)return;
  state.examIdx=Math.max(0,Math.min(items.length-1,state.examIdx+dir));
  persistExam();
  render();
  window.scrollTo(0,0);
}

function gotoExam(i){
  const items=state.examReviewId?(currentExamResult()&&currentExamResult().questions||[]):activeExamQuestions();
  if(!items.length)return;
  state.examIdx=Math.max(0,Math.min(items.length-1,i));
  persistExam();
  const d=document.querySelector('.drawer');
  if(d)d.open=false;
  render();
  window.scrollTo(0,0);
}

function finishExam(){
  const active=state.examActive;
  const items=activeExamQuestions();
  if(!active||!items.length)return;
  const answered=Object.keys(active.answers||{}).length;
  if(answered<items.length&&!confirm('还有 '+(items.length-answered)+' 题未作答，确认交卷？'))return;
  const stats=scoreExam(items,active.answers||{});
  const result={
    id:active.id,
    startedAt:active.startedAt,
    finishedAt:Date.now(),
    questions:items,
    answers:active.answers||{},
    ...stats,
  };
  state.examResults=[result].concat(state.examResults||[]).slice(0,30);
  state.examActive=null;
  state.examReviewId=result.id;
  state.examIdx=0;
  persistExam();
  persistExamResults();
  render();
  window.scrollTo(0,0);
}

function viewExamResult(id){
  state.examReviewId=id;
  state.examIdx=0;
  state.mode='exam';
  LS.set('mobileMode','exam');
  render();
  window.scrollTo(0,0);
}

function closeExamReview(){
  state.examReviewId=null;
  state.examIdx=0;
  render();
  window.scrollTo(0,0);
}

function resetCurrentType(){
  resetType(typeFromMode());
}

function resetType(t){
  const passText=state.resetKeepsPass?'Pass 标记会保留。':'Pass 标记也会一起清除。';
  if(!confirm('确认重置'+labelOf(t)+'题进度？错题本不会清空。'+passText))return;
  Object.keys(state.bankAnswered).forEach(k=>{if(k.startsWith(t+'_'))delete state.bankAnswered[k];});
  Object.keys(state.bankStats).forEach(k=>{if(k.startsWith(t+'_'))delete state.bankStats[k];});
  if(!state.resetKeepsPass)Object.keys(state.passed).forEach(k=>{if(k.startsWith(t+'_'))delete state.passed[k];});
  LS.set('bankAnswered',state.bankAnswered);
  LS.set('bankStats',state.bankStats);
  persistPassed();
  setCurrentIdx(0);
  render();
}

function getSaveData(){
  return {
    version:2,
    exportedAt:Date.now(),
    data:{
      bankAnswered:state.bankAnswered,
      bankStats:state.bankStats,
      wrongList:state.wrongList.map(normalizeWrongItem),
      answerOverrides:state.answerOverrides,
      examActive:state.examActive,
      examResults:state.examResults,
      examUsedKeys:state.examUsedKeys,
      wrongSettings:normalizeWrongSettings(state.wrongSettings),
      mobilePassed:state.passed,
      mobileDoubts:state.doubts,
      mobileResetKeepsPass:state.resetKeepsPass,
      mobileDarkMode:state.darkMode,
      mobileTopExpanded:state.topExpanded,
    }
  };
}

function applySaveData(payload){
  const data=payload&&payload.data&&typeof payload.data==='object'?payload.data:payload;
  if(!data||typeof data!=='object')throw new Error('文件内容不是有效存档');
  state.bankAnswered=data.bankAnswered&&typeof data.bankAnswered==='object'?data.bankAnswered:{};
  state.bankStats=data.bankStats&&typeof data.bankStats==='object'?data.bankStats:{};
  state.wrongList=Array.isArray(data.wrongList)?data.wrongList.map(normalizeWrongItem):[];
  state.answerOverrides=data.answerOverrides&&typeof data.answerOverrides==='object'?data.answerOverrides:{};
  state.wrongSettings=normalizeWrongSettings(data.wrongSettings||{});
  state.passed=data.mobilePassed&&typeof data.mobilePassed==='object'?data.mobilePassed:{};
  state.doubts=data.mobileDoubts&&typeof data.mobileDoubts==='object'?data.mobileDoubts:{};
  state.examActive=data.examActive&&typeof data.examActive==='object'?data.examActive:null;
  state.examResults=Array.isArray(data.examResults)?data.examResults:[];
  state.examUsedKeys=data.examUsedKeys&&typeof data.examUsedKeys==='object'?data.examUsedKeys:buildExamUsedKeys(state.examResults);
  state.examReviewId=null;
  state.examIdx=0;
  state.resetKeepsPass=data.mobileResetKeepsPass!==false;
  state.darkMode=data.mobileDarkMode===true;
  state.topExpanded=data.mobileTopExpanded!==false;
  LS.set('bankAnswered',state.bankAnswered);
  LS.set('bankStats',state.bankStats);
  persistAnswerOverrides();
  LS.set('mobileResetKeepsPass',state.resetKeepsPass);
  LS.set('mobileDarkMode',state.darkMode);
  LS.set('mobileTopExpanded',state.topExpanded);
  persistExam();
  persistExamResults();
  persistExamUsedKeys();
  persistWrongList();
  persistWrongSettings();
  persistAnswerOverrides();
  persistPassed();
  persistDoubts();
  render();
}

function exportSave(){
  const blob=new Blob([JSON.stringify(getSaveData(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const stamp=new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
  a.href=url;a.download='ai3-mobile-save-'+stamp+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function importSave(evt){
  const file=evt.target&&evt.target.files&&evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{applySaveData(JSON.parse(reader.result));alert('导入成功');}
    catch(err){alert('导入失败：'+(err&&err.message?err.message:'文件格式不正确'));}
    finally{evt.target.value='';}
  };
  reader.readAsText(file,'utf-8');
}

function toggleDoubt(type,idx){
  clearAutoTimer();
  const q=bank[type][idx],key=keyOf(type,idx);
  if(state.doubts[key]){
    delete state.doubts[key];
    persistDoubts();
    render();
    return;
  }
  if(state.passed[key]){delete state.passed[key];persistPassed();}
  state.doubts[key]=true;
  persistDoubts();
  copyText(buildAskAIText(q,sourceLabel(q,idx,false),state.bankAnswered[key],true));
  render();
}

function buildAskAIText(q,label,userAns,doubtOnly=false){
  const lines=[];
  lines.push(label);
  lines.push('这是一个'+(q.type==='s'?'单选题':'判断题')+'。');
  lines.push('题目：'+q.q);
  if(q.type==='s'&&q.opts){
    lines.push('选项：');
    Object.entries(q.opts).sort().forEach(([k,v])=>lines.push(k+'. '+v));
  }else{
    lines.push('选项：正确 / 错误');
  }
  if(doubtOnly){
    lines.push('这个题怎么做？');
    return lines.join('\n');
  }
  if(userAns!==undefined)lines.push('我选的是：'+optionText(q,userAns));
  lines.push('正确答案是：'+optionText(q,answerOf(q)));
  lines.push('为什么错了？');
  return lines.join('\n');
}

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>alert('已复制，可直接粘贴问 AI。')).catch(()=>fallbackCopy(text));
  }else fallbackCopy(text);
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{document.execCommand('copy');alert('已复制，可直接粘贴问 AI。');}
  catch{alert('复制失败，请手动复制。');}
  ta.remove();
}

function copyAskAI(type,idx,wrongMode){
  let q,userAns,label;
  if(wrongMode){
    const items=wrongItems();
    q=items[Math.min(idx,items.length-1)];
    if(!q)return;
    userAns=state.wrongAnswered[q.key]!==undefined?state.wrongAnswered[q.key]:q.userAns;
    label=sourceLabel(q,idx,true);
  }else{
    q=bank[type][idx];
    userAns=state.bankAnswered[keyOf(type,idx)];
    label=sourceLabel(q,idx,false);
  }
  copyText(buildAskAIText(q,label,userAns));
}

function questionFontStyle(q){
  const qLen=String(q&&q.q||'').length;
  const optLens=q&&q.opts?Object.values(q.opts).map(v=>String(v||'').length):[2];
  const optMax=Math.max(...optLens,2);
  let qFont=qLen>140?15:qLen>92?16:17;
  let optFont=optMax>62?14:optMax>38?14.5:15;
  return ` style="--q-font:${qFont}px;--opt-font:${optFont}px"`;
}

function renderHeader(){
  const isWrong=state.mode==='wrong';
  const isSettings=state.mode==='settings';
  const isExam=state.mode==='exam';
  const t=typeFromMode();
  const examItems=state.examReviewId?(currentExamResult()&&currentExamResult().questions||[]):activeExamQuestions();
  const examAnswered=state.examActive&&state.examActive.answers?examItems.filter(item=>state.examActive.answers[item.key]!==undefined).length:0;
  const st=isWrong?{total:wrongItems().length,answered:0,correct:0,wrong:0,passed:0,doubts:0,completed:0}:isExam?{total:examItems.length,answered:examAnswered,correct:0,wrong:0,passed:0,doubts:0,completed:examAnswered}:typeStats(t);
  const idx=isWrong?Math.min(state.wrongIdx+1,Math.max(st.total,1)):isExam?(st.total?Math.min(state.examIdx+1,st.total):0):currentIdx()+1;
  const doneForPct=isWrong?idx:isSettings?0:st.completed;
  const pct=st.total?(Math.min(st.total,doneForPct)/st.total*100):0;
  const subtitle=isSettings?'存档与规则':isExam?'模拟测试':isWrong?'错题练习':labelOf(t)+'题库';
  const pillText=isSettings||isExam&&!st.total?subtitle:subtitle+' · '+idx+'/'+(st.total||0);
  const topOpen=state.topExpanded?' open':'';
  const metaText=isSettings?'导入导出、Pass、疑问、错题规则':isExam?(state.examReviewId?'模拟记录回看':state.examActive?`已答${st.answered} · 未答${Math.max(0,st.total-st.answered)}`:`平均分 ${examAverageScore().toFixed(1)}`):isWrong?'当前位置':`已做${st.answered} · Pass${st.passed} · 疑问${st.doubts} · 对${st.correct} · 错${st.wrong}`;
  return `<div class="top">
    <div class="title-row"><div class="pill">${pillText}</div></div>
    <details class="top-tools"${topOpen} ontoggle="setTopExpanded(this.open)">
      <summary><span>操作</span></summary>
      <div class="tabs">
        <button class="tab ${state.mode==='j'?'active':''}" onclick="switchMode('j')">判断题</button>
        <button class="tab ${state.mode==='s'?'active':''}" onclick="switchMode('s')">单选题</button>
        <button class="tab ${state.mode==='exam'?'active':''}" onclick="switchMode('exam')">模拟测试</button>
        <button class="tab ${state.mode==='wrong'?'active':''}" onclick="switchMode('wrong')">错题本(${wrongItems().length})</button>
        <button class="tab ${state.mode==='settings'?'active':''}" onclick="switchMode('settings')">设置</button>
      </div>
      <div class="progress-wrap"><div class="progress-meta"><span>${metaText}</span><span>${isSettings?'':pct.toFixed(1)+'%'}</span></div><div class="bar"><i style="width:${Math.min(100,pct).toFixed(1)}%"></i></div></div>
    </details>
  </div>`;
}

function renderQuestionCard(q,idx,type,answered,userAns,wrongMode,passed=false){
  const ok=answered?sameAnswer(q,userAns):false;
  const noticeKey=wrongMode?null:keyOf(type,idx);
  const notice=noticeKey&&state.passNotice&&state.passNotice.key===noticeKey?state.passNotice:null;
  const passActive=!wrongMode&&noticeKey&&state.passVerifyKey===noticeKey;
  const label=sourceLabel(q,idx,wrongMode);
  const realIdx=wrongMode?findBankIndex(type,q.q):idx;
  const doubtActive=!wrongMode&&realIdx>=0&&isDoubt(type,realIdx);
  const editBtn=realIdx>=0?`<button class="edit-btn" title="修改正确答案" onclick="editCorrectAnswer('${type}',${realIdx})">改</button>`:'';
  const doubtBtn=!wrongMode&&realIdx>=0?`<button class="doubt-btn ${doubtActive?'active':''}" title="标记疑问并复制问 AI" onclick="toggleDoubt('${type}',${realIdx})">?</button>`:'';
  const copyBtn=answered&&!ok?`<button class="copy-btn" title="复制问 AI" onclick="copyAskAI('${type}',${idx},${wrongMode})">⧉</button>`:'';
  const fontStyle=questionFontStyle(q);
  let h=`<div class="card q-card"${fontStyle}>
    <div class="q-head"><div class="q-meta"><span class="q-type">${labelOf(type)}</span>${copyBtn}</div><div class="q-side">${editBtn}${doubtBtn}<span class="q-index">${label}</span></div></div>
    <div class="q-text">${q.q}</div>`;
  if(type==='j'){
    const opts=[['正确',true],['错误',false]];
    h+=`<div class="judge-grid">`;
    opts.forEach(([text,val])=>{
      let cls='opt';
      if(answered){
        cls+=' disabled';
        if(val===answerOf(q,type,realIdx))cls+=val===userAns?' correct':' missed';
        else if(val===userAns)cls+=' wrong';
      }
      h+=`<button class="${cls}" onclick="optionClick(event,${val},${wrongMode})"><span class="opt-text">${text}</span></button>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="opts">`;
    Object.entries(q.opts||{}).sort().forEach(([k,v])=>{
      let cls='opt';
      if(answered){
        cls+=' disabled';
        if(k===answerOf(q,type,realIdx))cls+=k===userAns?' correct':' missed';
        else if(k===userAns)cls+=' wrong';
      }
      h+=`<button class="${cls}" onclick="optionClick(event,'${k}',${wrongMode})"><span class="letter">${k}</span><span class="opt-text">${v}</span></button>`;
    });
    h+=`</div>`;
  }
  if(answered){
    h+=`<div class="result ${ok?'ok':'bad'}">${ok?'回答正确，马上进入下一题。':'回答错误，正确答案：'+answerText(q)}</div>`;
  }else if(passed){
    h+=`<div class="result ok">已 Pass：下次刷题会自动跳过，答题卡显示为蓝色。</div>`;
  }
  if(notice){
    h+=`<div class="result ${notice.type==='bad'?'bad':'warn'}">${notice.msg}</div>`;
  }
  const passText=passed?'取消 Pass':passActive?'取消检验':answered?'Pass 本题':'Pass 检验';
  const passClass=passActive?'btn pass pending':'btn pass';
  const showPass=!wrongMode&&(!answered||ok||passed);
  h+=`<div class="actions">
    <button class="btn ghost" onclick="${wrongMode?'wrongNav(-1,false)':'goPrev()'}">上一题</button>
    <button class="btn primary" onclick="${wrongMode?'wrongNav(1,false)':'goNext(false)'}">下一题</button>
    ${showPass?`<button class="${passClass}"${!answered?' style="grid-column:1/-1"':''} onclick="togglePassCurrent()">${passText}</button>`:''}
    ${!wrongMode&&answered&&!ok?`<button class="btn" onclick="markCurrentAsCorrect()">点错了，按正确</button>`:''}
    ${!wrongMode&&answered&&ok?`<button class="btn danger" onclick="addCurrentToWrong()">加入错题本</button>`:''}
    ${wrongMode&&answered&&!ok?`<button class="btn" style="grid-column:1/-1" onclick="markWrongAsCorrect()">点错了，按正确并移除</button>`:''}
  </div></div>`;
  return h;
}

function renderExamQuestionCard(q,item,idx,total,userAns,locked=false){
  const correct=answerOf(q,item.type,item.idx);
  const answered=userAns!==undefined;
  const ok=answered&&normalizeAnswer(item.type,userAns)===correct;
  let h=`<div class="card q-card${locked?'':' exam-live'}"${questionFontStyle(q)}>
    <div class="q-head"><div class="q-meta"><span class="q-type">模拟 · ${labelOf(item.type)}</span></div><div class="q-side"><button class="edit-btn" title="修改正确答案" onclick="editCorrectAnswer('${item.type}',${item.idx})">改</button><span class="q-index">第${idx+1}/${total}题</span></div></div>
    <div class="q-text">${q.q}</div>`;
  if(item.type==='j'){
    const opts=[['正确',true],['错误',false]];
    h+=`<div class="judge-grid">`;
    opts.forEach(([text,val])=>{
      let cls='opt';
      const chosen=answered&&normalizeAnswer(item.type,userAns)===val;
      if(locked){
        cls+=' disabled';
        if(val===correct)cls+=chosen?' correct':' missed';
        else if(chosen)cls+=' wrong';
      }else if(chosen)cls+=' selected';
      h+=`<button class="${cls}" onclick="examAnswer(${val})"><span class="opt-text">${text}</span></button>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="opts">`;
    Object.entries(q.opts||{}).sort().forEach(([k,v])=>{
      let cls='opt';
      const chosen=answered&&normalizeAnswer(item.type,userAns)===k;
      if(locked){
        cls+=' disabled';
        if(k===correct)cls+=chosen?' correct':' missed';
        else if(chosen)cls+=' wrong';
      }else if(chosen)cls+=' selected';
      h+=`<button class="${cls}" onclick="examAnswer('${k}')"><span class="letter">${k}</span><span class="opt-text">${v}</span></button>`;
    });
    h+=`</div>`;
  }
  if(locked){
    h+=`<div class="result ${ok?'ok':'bad'}">${ok?'回答正确。':'回答错误，正确答案：'+answerText(q)}</div>`;
  }else if(answered){
    h+=`<div class="result warn">已选：${optionText(q,userAns)}。交卷前可返回修改。</div>`;
  }
  h+=`<div class="actions">
    <button class="btn ghost" onclick="examNav(-1)">上一题</button>
    <button class="btn primary" onclick="examNav(1)">下一题</button>
    ${locked?`<button class="btn" style="grid-column:1/-1" onclick="closeExamReview()">返回记录</button>`:`<button class="btn danger" style="grid-column:1/-1" onclick="finishExam()">交卷</button>`}
  </div></div>`;
  return h;
}

function renderExamAnswerCard(items,answers,locked=false){
  const cur=Math.max(0,Math.min(state.examIdx,Math.max(items.length-1,0)));
  let h=`<details class="card drawer" open><summary><span>模拟答题卡</span><span>${items.length?cur+1:0}/${items.length}</span></summary>`;
  [['j','判断题'],['s','单选题']].forEach(([type,title])=>{
    const group=items.map((item,i)=>({item,i})).filter(x=>x.item.type===type);
    if(!group.length)return;
    h+=`<div class="dot-section">${title}</div><div class="dot-grid">`;
    group.forEach(({item,i})=>{
      const q=examQuestion(item);
      const ans=answers[item.key];
      let cls='dot';
      if(i===cur)cls+=' current';
      if(ans!==undefined){
        if(locked&&q)cls+=sameAnswer(q,ans)?' done':' bad';
        else cls+=' done';
      }
      h+=`<button class="${cls}" onclick="gotoExam(${i})">${i+1}</button>`;
    });
    h+=`</div>`;
  });
  h+=`</details>`;
  return h;
}

function renderExamReview(result){

  if(!items.length)return renderExamHome();

      <div class="mini-grid">
        <div class="mini"><b>${result.jCorrect}/${result.jTotal}</b><span>判断</span></div>

    let cls='dot';
    if(i===cur)cls+=' current';
    if(state.doubts[k])cls+=' doubt';
    else if(state.passed[k])cls+=' pass';
    else if(ua!==undefined)cls+=sameAnswer(q,ua)?' done':' bad';
    h+=`<button class="${cls}" onclick="gotoQuestion(${i})">${i+1}</button>`;
  });
  h+=`</div><div style="padding:0 12px 12px"><button class="btn danger" style="width:100%" onclick="resetType('${type}')">重置${labelOf(type)}答题卡</button></div></details>`;
  return h;
}

function renderWrongAnswerCard(){
  const items=wrongItems(),cur=Math.min(state.wrongIdx,Math.max(items.length-1,0));
  let h=`<details class="card drawer"><summary><span>错题答题卡</span><span>${items.length?cur+1:0}/${items.length}</span></summary>`;
  [['s','单选题'],['j','判断题']].forEach(([type,title])=>{
    const group=items.map((w,i)=>({w,i})).filter(x=>x.w.type===type);
    if(group.length===0)return;
    h+=`<div class="dot-section">${title}</div><div class="dot-grid">`;
    group.forEach(({w,i})=>{
      const ua=state.wrongAnswered[w.key];
      const origin=wrongOriginalIndex(w);
      let cls='dot';
      if(i===cur)cls+=' current';
      if(ua!==undefined)cls+=sameAnswer(w,ua)?' done':' bad';
      h+=`<button class="${cls}" onclick="gotoWrong(${i})" title="${sourceLabel(w,i,true)}">${origin>=0?origin+1:i+1}</button>`;
    });
    h+=`</div>`;
  });
  h+=`</details>`;
  return h;
}

function renderPractice(){
  const type=typeFromMode(),idx=currentIdx(),q=bank[type][idx],k=keyOf(type,idx);
  const answered=state.bankAnswered[k]!==undefined;
  let h=`<div class="main">`;
  h+=renderQuestionCard(q,idx,type,answered,state.bankAnswered[k],false,isPassed(type,idx));
  h+=renderAnswerCard();
  h+=`</div>`;
  return h;
}

function renderWrong(){
  const items=wrongItems();
  let h=`<div class="main">`;
  if(items.length===0){
    h+=`<div class="card empty">暂无判断题/单选题错题。<br>去题库刷几题，答错后会自动进入这里。</div>`;
    h+=`</div>`;
    return h;
  }
  const idx=Math.min(state.wrongIdx,items.length-1),w=items[idx];
  const aKey=w.key;
  const answered=state.wrongAnswered[aKey]!==undefined;
  h+=renderQuestionCard(w,idx,w.type,answered,state.wrongAnswered[aKey],true,false);
  h+=renderWrongAnswerCard();
  h+=`<div class="card settings"><div><div class="setting-title">错题规则</div><div class="setting-text">当前阈值：${getWrongRemoveTarget()===0?'手动移除':'连续答对 '+getWrongRemoveTarget()+' 次自动移除'}。答错会停住，答对会进入下一题。</div></div></div>`;
  h+=`</div>`;
  return h;
}

function renderTools(){
  const target=getWrongRemoveTarget();
  const passCount=Object.keys(state.passed).length;
  const doubtCount=Object.keys(state.doubts).length;
  return `<div class="card settings">
    <div><div class="setting-title">存档</div><div class="setting-text">和电脑版使用同一套 localStorage 键；导出的 JSON 可互相导入。</div></div>
    <div class="tools"><button class="btn" onclick="exportSave()">导出存档</button><button class="btn" onclick="document.getElementById('importFile').click()">导入存档</button></div>
    <input id="importFile" class="file" type="file" accept="application/json,.json" onchange="importSave(event)">
    <div><div class="setting-title">显示模式</div><div class="seg">
      <button class="btn ${!state.darkMode?'active':''}" onclick="setDarkMode(false)">浅色</button>
      <button class="btn ${state.darkMode?'active':''}" onclick="setDarkMode(true)">暗色</button>
    </div></div>
    <div><div class="setting-title">Pass 标记</div><div class="setting-text">已 Pass：${passCount} 题。Pass 题会在下一轮刷题和自动下一题时跳过，答题卡显示蓝色。</div></div>
    <div class="tools"><button class="btn" onclick="clearPassType('j')">清除判断 Pass</button><button class="btn" onclick="clearPassType('s')">清除单选 Pass</button></div>
    <button class="btn danger" onclick="clearAllPass()">清除全部 Pass</button>
    <div><div class="setting-title">疑问题</div><div class="setting-text">已标记：${doubtCount} 题。疑问题不会被重置答题卡清除，且不能 Pass。</div></div>
    <div class="tools"><button class="btn" onclick="clearDoubtType('j')">清除判断疑问</button><button class="btn" onclick="clearDoubtType('s')">清除单选疑问</button></div>
    <button class="btn danger" onclick="clearAllDoubts()">清除全部疑问</button>
    <div><div class="setting-title">重置答题卡时</div><div class="seg">
      <button class="btn ${state.resetKeepsPass?'active':''}" onclick="setResetKeepsPass(true)">保留 Pass</button>
      <button class="btn ${!state.resetKeepsPass?'active':''}" onclick="setResetKeepsPass(false)">清除 Pass</button>
    </div></div>
    <div><div class="setting-title">错题移除</div><div class="seg">
      ${[0,2,3,5].map(v=>`<button class="btn ${target===v?'active':''}" onclick="setWrongRemoveTarget(${v})">${v===0?'手动':v+'次'}</button>`).join('')}
    </div></div>
    <div class="tools"><button class="btn danger" onclick="resetType('j')">重置判断进度</button><button class="btn danger" onclick="resetType('s')">重置单选进度</button></div>
  </div>`;
}

function renderSettings(){
  return `<div class="main">${renderTools()}</div>`;
}

function render(){
  applyTheme();
  const app=document.getElementById('app');
  app.innerHTML=renderHeader()+(state.mode==='settings'?renderSettings():state.mode==='exam'?renderExam():state.mode==='wrong'?renderWrong():renderPractice());
}

render();
</script>
</body>
</html>
